              es: "Documento qu\xe9 sali\xf3 mal, lo arreglo y nunca m\xe1s lo menciono.",
              score: "C",
            },
            {
              en: "I apologize multiple times over the next several days unprompted.",
              es: "Me disculpo m\xfaltiples veces durante los d\xedas siguientes sin que nadie me lo pida.",
              score: "A",
            },
            {
              en: "I privately spiral AND build a corrective system.",
              es: "Me espiralo internamente Y armo un sistema correctivo.",
              score: "B",
            },
            {
              en: "I acknowledge it, correct it, and genuinely move on.",
              es: "Lo reconozco, lo corrijo y sigo adelante de verdad.",
              score: "N",
            },
          ],
        },
        {
          en: { text: "People close to you would say you are\u2026" },
          es: { text: "La gente cercana dir\xeda que vos sos\u2026" },
          options: [
            {
              en: "Reliable, ambitious, a little cold \u2014 but always respected.",
              es: "Confiable, ambicioso/a, un poco fr\xedo/a \u2014 pero siempre respetado/a.",
              score: "C",
            },
            {
              en: "Intense, honest, and occasionally too much \u2014 in the best way.",
              es: "Intenso/a, honesto/a y ocasionalmente demasiado \u2014 de la mejor manera.",
              score: "A",
            },
            {
              en: "Weirdly high-achieving but also kind of hard to read.",
              es: "Raro/a pero muy exitoso/a y tambi\xe9n medio dif\xedcil de descifrar.",
              score: "B",
            },
            {
              en: "Just a normal, well-adjusted person, honestly.",
              es: "Simplemente una persona normal y equilibrada, la verdad.",
              score: "N",
            },
          ],
        },
      ];

      const results = {
        C: {
          badge: "♑",
          en: {
            title: "You are a Capricorn.",
            subtitle: "Classic. Predictable. Correct.",
            desc: "You are methodical, strategic, and quietly convinced you are the most competent person in any given room (and you are usually right). Your control issues are actually efficiency. Your emotional unavailability is actually professionalism. You don\u2019t dislike people \u2014 you just prefer outcomes.",
          },
          es: {
            title: "Sos Capricornio.",
            subtitle: "Cl\xe1sico. Predecible. Correcto.",
            desc: "Sos met\xf3dico/a, estrat\xe9gico/a y en silencio convencido/a de que sos la persona m\xe1s competente de cualquier habitaci\xf3n en la que entr\xe1s (y generalmente ten\xe9s raz\xf3n). Tus problemas de control en realidad son eficiencia. Tu distancia emocional en realidad es profesionalismo. No es que no te guste la gente \u2014 es que prefer\xeds los resultados.",
          },
        },
        A: {
          badge: "∞",
          en: {
            title: "You are Autistic.",
            subtitle: "Neurospicy. The original kind.",
            desc: "You experience the world with an intensity and specificity that most people can\u2019t quite access. Your brain is pattern-seeking, deeply feeling, and occasionally at war with a world that wasn\u2019t designed for how you operate. You have been described as \u201ca lot\u201d by people who are simply not enough.",
          },
          es: {
            title: "Sos autista.",
            subtitle: "Neuroespeciado/a. Del tipo original.",
            desc: "Experiment\xe1s el mundo con una intensidad y especificidad a la que la mayor\xeda no puede acceder. Tu cerebro busca patrones, siente profundo y de vez en cuando est\xe1 en guerra con un mundo que no fue dise\xf1ado para como vos funcion\xe1s. Te han descrito como \u201cdemasiado\u201d personas que simplemente no son suficiente.",
          },
        },
        B: {
          badge: "♑∞",
          en: {
            title: "You are both.",
            subtitle: "A rare and ungovernable combination.",
            desc: "You have the relentless drive of a Capricorn AND the neurological specificity of an autistic person. You are extremely productive in very niche domains. You have strong opinions about organization systems, sensory experiences, and what constitutes acceptable behavior. People either deeply admire you or find you exhausting. Frequently both.",
          },
          es: {
            title: "Sos los dos.",
            subtitle: "Una combinaci\xf3n rara e ingobernable.",
            desc: "Ten\xe9s la determinaci\xf3n implacable de un Capricornio Y la especificidad neurol\xf3gica de una persona autista. Sos extremadamente productivo/a en dominios muy espec\xedficos. Ten\xe9s opiniones muy firmes sobre sistemas de organizaci\xf3n, experiencias sensoriales y lo que constituye comportamiento aceptable. La gente te admira profundamente o te encuentra agotador/a. Frecuentemente las dos cosas.",
          },
        },
        N: {
          badge: "✦",
          en: {
            title: "You are neither.",
            subtitle: "Statistically suspicious.",
            desc: "You report being a flexible, low-drama, emotionally regulated human who adapts easily to change and does not overthink things. Either you are in profound denial, or you are a genuinely balanced person \u2014 a rare specimen. We respect it. We also don\u2019t fully believe you.",
          },
          es: {
            title: "No sos ninguno.",
            subtitle: "Estad\xedsticamente sospechoso.",
            desc: "Report\xe1s ser un ser humano flexible, sin drama y emocionalmente regulado que se adapta f\xe1cilmente al cambio y no se queda dando vueltas con las cosas. O est\xe1s en profunda negaci\xf3n, o sos genuinamente una persona equilibrada \u2014 una especie rara. Lo respetamos. Tampoco te creemos del todo.",
          },
        },
      };

      let current = 0;
      let answers = [];
      let selected = null;
      let shuffledOptions = [];
      let lastWinner = null;

      function toggleLang() {
        lang = lang === "en" ? "es" : "en";
        document.documentElement.lang = lang;
        document.getElementById("lang-btn").textContent = ui[lang].langBtn;
        document.getElementById("about-btn").textContent = ui[lang].aboutBtn;
        document.getElementById("quiz-title").textContent = ui[lang].title;
        document.getElementById("quiz-tagline").textContent = ui[lang].tagline;
        document.getElementById("result-title-header").textContent = ui[lang].title;
        document.getElementById("result-tagline").textContent = ui[lang].resultsIn;

        if (!document.getElementById("quiz-view").classList.contains("hidden")) {
          renderQuestion(false);
        } else if (!document.getElementById("result-view").classList.contains("hidden") && lastWinner) {
          renderResult(lastWinner);
        } else if (!document.getElementById("about-view").classList.contains("hidden")) {
          renderAbout();
        }
      }

      function showAbout(show) {
        const aboutView = document.getElementById("about-view");
        const quizView = document.getElementById("quiz-view");
        const resultView = document.getElementById("result-view");

        if (show) {
          quizView.classList.add("hidden");
          resultView.classList.add("hidden");
          aboutView.classList.remove("hidden");
          renderAbout();
        } else {
          aboutView.classList.add("hidden");
          if (lastWinner) {
            resultView.classList.remove("hidden");
          } else {
            quizView.classList.remove("hidden");
          }
        }
      }

      function renderAbout() {
        const a = ui[lang].about;
        document.getElementById("about-heading").textContent = a.heading;
        document.getElementById("back-btn").textContent = a.back;
        document.getElementById("about-message").innerHTML = a.messages
          .map((m) => `<p>${m}</p>`)
          .join("");
        document.getElementById("about-resources-heading").textContent = a.resourcesHeading;
        document.getElementById("about-link-list").innerHTML = a.links
          .map(
            (l) =>
              `<li><a href="${l.href}" target="_blank" rel="noopener noreferrer">${l.label}</a><span class="link-desc">${l.desc}</span></li>`,
          )
          .join("");
        document.getElementById("about-inclusion").textContent = a.inclusion;
      }

      function shuffle(arr) {
        return arr
          .map((a) => ({ ...a, _sort: Math.random() }))
          .sort((a, b) => a._sort - b._sort);
      }

      function renderQuestion(doShuffle = true) {
        const q = questions[current];

        if (doShuffle) {
          shuffledOptions = shuffle(q.options);
          selected = null;
          document.getElementById("next-btn").disabled = true;
        }

        document.getElementById("question-text").textContent = q[lang].text;
        document.getElementById("progress-label").textContent = ui[
          lang
        ].questionOf(current + 1, questions.length);
        document.getElementById("progress-fill").style.width =
          `${(current / questions.length) * 100}%`;
        document.getElementById("next-btn").textContent = ui[lang].next;

        const container = document.getElementById("options");
        container.innerHTML = "";

        shuffledOptions.forEach((opt) => {
          const btn = document.createElement("button");
          btn.className = "option";
          btn.textContent = opt[lang];
          if (opt.score === selected) btn.classList.add("selected");
          btn.addEventListener("click", () => selectOption(btn, opt.score));
          container.appendChild(btn);
        });
      }

      function selectOption(btn, score) {
        document
          .querySelectorAll(".option")
          .forEach((b) => b.classList.remove("selected"));
        btn.classList.add("selected");
        selected = score;
        document.getElementById("next-btn").disabled = false;
      }

      document.getElementById("next-btn").addEventListener("click", () => {
        if (selected === null) return;
        answers.push(selected);

        if (current < questions.length - 1) {
          current++;
          renderQuestion();
        } else {
          showResult();
        }
      });

      function renderResult(winner) {
        const r = results[winner];
        const t = r[lang];
        document.getElementById("result-badge").textContent = r.badge;
        document.getElementById("result-title").textContent = t.title;
        document.getElementById("result-subtitle").textContent = t.subtitle;
        document.getElementById("result-desc").textContent = t.desc;
        document.getElementById("retry-btn").textContent = ui[lang].retake;

        const counts = { C: 0, A: 0, B: 0, N: 0 };
        answers.forEach((a) => counts[a]++);

        const labels = ui[lang].scoreLabels;
        const bp = document.getElementById("score-breakdown");
        bp.innerHTML = [
          [labels[0], counts.C],
          [labels[1], counts.A],
          [labels[2], counts.B],
          [labels[3], counts.N],
        ]
          .map(
            ([label, n]) =>
              `<div class="score-pill">${label}: <span>${n}</span></div>`,
          )
          .join("");
      }

      function showResult() {
        const counts = { C: 0, A: 0, B: 0, N: 0 };
        answers.forEach((a) => counts[a]++);

        let winner = "N";
        const max = Math.max(counts.C, counts.A, counts.B, counts.N);

        if (counts.B === max) {
          winner = "B";
        } else if (counts.C === max && counts.A === max) {
          winner = "B";
        } else if (counts.C === max) {
          winner = "C";
        } else if (counts.A === max) {
          winner = "A";
        } else {
          winner = "N";
        }

        lastWinner = winner;
        renderResult(winner);

        document.getElementById("quiz-view").classList.add("hidden");
        document.getElementById("result-view").classList.remove("hidden");
      }

      function restart() {
        current = 0;
        answers = [];
        selected = null;
        lastWinner = null;
        document.getElementById("result-view").classList.add("hidden");
        document.getElementById("quiz-view").classList.remove("hidden");
        renderQuestion();
      }

      // Init
      renderQuestion();
    </script>
  </body>
</html>
